services:
  mongodb:
    image: mongo:7
    container_name: movietracker-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: movietracker-mongo-express
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123

  api:
    build:
      context: .
      dockerfile: MovieTracker.API/Dockerfile
    container_name: movietracker-api
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "5265:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDbSettings__ConnectionString: mongodb://admin:admin123@mongodb:27017/?authSource=admin
      MongoDbSettings__DatabaseName: MovieTrackerDb
      MongoDbSettings__MoviesCollectionName: Movies
      MongoDbSettings__UsersCollectionName: Users
      MongoDbSettings__ReviewsCollectionName: Reviews
      MongoDbSettings__WatchlistCollectionName: Watchlist
      TmdbSettings__ApiKey: ${TMDB_API_KEY}

volumes:
  mongo_data:
